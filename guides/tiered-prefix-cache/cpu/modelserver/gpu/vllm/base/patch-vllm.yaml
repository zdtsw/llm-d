apiVersion: apps/v1
kind: Deployment
metadata:
  name: decode
spec:
  replicas: 4
  template:
    spec:
      containers:
        - name: modelserver
          image: vllm/vllm-openai:v0.19.1
          command: ["vllm", "serve"]
          resources:
            limits:
              cpu: '16'
              memory: 400Gi
              nvidia.com/gpu: 2
            requests:
              cpu: '8'
              memory: 200Gi
              nvidia.com/gpu: 2
          volumeMounts:
            - mountPath: /dev/shm
              name: shm
            - mountPath: /.cache
              name: torch-compile-cache
          startupProbe:
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 120
          livenessProbe:
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
      restartPolicy: Always
      enableServiceLinks: false
      terminationGracePeriodSeconds: 130
      volumes:
        - name: data
          emptyDir: {}
        - name: shm
          emptyDir:
            medium: Memory
        - name: torch-compile-cache
          emptyDir: {}
