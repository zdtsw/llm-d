apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base

patches:
  # Apply strategic merge patch for prefill configuration
  - path: deployment-patch.yaml

  # Rename deployment to "prefill"
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /metadata/name
        value: prefill
