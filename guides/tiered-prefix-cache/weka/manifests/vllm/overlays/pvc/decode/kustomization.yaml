apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../decode

patches:
  # Patch weka-storage volume to use PVC (index 1: after shm)
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: replace
        path: /spec/template/spec/volumes/1
        value:
          name: weka-storage
          persistentVolumeClaim:
            claimName: wekafs-amg
