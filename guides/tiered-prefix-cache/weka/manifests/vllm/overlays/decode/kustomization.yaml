apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../weka-base

patches:
  # Apply strategic merge patch for decode configuration
  - path: deployment-patch.yaml

  # Rename deployment to "decode"
  - target:
      kind: Deployment
      name: llm-d-model-server
    patch: |-
      - op: replace
        path: /metadata/name
        value: decode

  # Set ports to only 8200 for decode
  - target:
      kind: Deployment
      name: decode
    patch: |-
      - op: replace
        path: /spec/template/spec/containers/0/ports
        value:
          - containerPort: 8200
            name: metrics
            protocol: TCP
