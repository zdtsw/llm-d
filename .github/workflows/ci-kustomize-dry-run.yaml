name: CI Guide Dry Run

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/ci-helmfile-dry-run.yaml
      - .github/scripts/**
      - guides/recipes/**
      - guides/optimized-baseline/**
      - guides/pd-disaggregation/**
      - guides/precise-prefix-cache-aware/**
      - guides/simulated-accelerators/**
      - guides/workload-autoscaling/**
      - guides/prereq/**
      - helpers/client-setup/**
      - docs/monitoring/scripts/install-prometheus-grafana.sh
      - .github/workflows/ci-kustomize-dry-run.yaml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      optimized-baseline: ${{ steps.filter.outputs.optimized-baseline }}
      pd-disaggregation: ${{ steps.filter.outputs.pd-disaggregation }}
      precise-prefix-cache-aware: ${{ steps.filter.outputs.precise-prefix-cache-aware }}
      simulated-accelerators: ${{ steps.filter.outputs.simulated-accelerators }}
      workload-autoscaling: ${{ steps.filter.outputs.workload-autoscaling }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            optimized-baseline:
              - .github/workflows/ci-helmfile-dry-run.yaml
              - .github/scripts/install-gke-crds.sh
              - guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh
              - docs/monitoring/scripts/install-prometheus-grafana.sh
              - guides/recipes/modelserver/**
              - guides/recipes/scheduler/**
              - guides/optimized-baseline/**
            pd-disaggregation:
              - .github/workflows/ci-helmfile-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/prereq/gateway-provider/common-configurations/**
              - guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh
              - guides/prereq/gateway-provider/*.helmfile.yaml
              - docs/monitoring/scripts/install-prometheus-grafana.sh
              - guides/pd-disaggregation/**
            precise-prefix-cache-aware:
              - .github/workflows/ci-helmfile-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/prereq/gateway-provider/common-configurations/**
              - guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh
              - guides/prereq/gateway-provider/*.helmfile.yaml
              - docs/monitoring/scripts/install-prometheus-grafana.sh
              - guides/precise-prefix-cache-aware/**
            simulated-accelerators:
              - .github/workflows/ci-helmfile-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/prereq/gateway-provider/common-configurations/**
              - guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh
              - guides/prereq/gateway-provider/*.helmfile.yaml
              - docs/monitoring/scripts/install-prometheus-grafana.sh
              - guides/simulated-accelerators/**
            workload-autoscaling:
              - .github/workflows/ci-helmfile-dry-run.yaml
              - helpers/client-setup/install-deps.sh
              - guides/prereq/gateway-provider/common-configurations/**
              - guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh
              - guides/prereq/gateway-provider/*.helmfile.yaml
              - docs/monitoring/scripts/install-prometheus-grafana.sh
              - guides/workload-autoscaling/**

  dry-run-optimized-baseline:
    needs: detect-changes
    if: needs.detect-changes.outputs.optimized-baseline == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kustomize-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh > /dev/null

      - name: Install monitoring CRDs
        run: docs/monitoring/scripts/install-prometheus-grafana.sh --crds-only

      - name: Install LWS CRDs
        run: |
          kubectl apply --server-side -f \
            https://raw.githubusercontent.com/kubernetes-sigs/lws/v0.7.0/config/crd/bases/leaderworkerset.x-k8s.io_leaderworkersets.yaml

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run scheduler charts
        run: |
          CHART_VERSION=v1.5.0
          failed=0
          for chart in standalone inferencepool; do
            echo ""
            echo "========================================"
            echo "optimized-baseline: scheduler (${chart})"
            echo "========================================"
            echo "--- helm template ---"
            if ! helm template optimized-baseline-scheduler \
              "oci://registry.k8s.io/gateway-api-inference-extension/charts/${chart}" \
              -f guides/recipes/scheduler/base.values.yaml \
              -f guides/recipes/scheduler/features/monitoring.values.yaml \
              -f guides/optimized-baseline/scheduler/optimized-baseline.values.yaml \
              --version "${CHART_VERSION}" > /tmp/rendered.yaml; then
              echo "FAIL: helm template failed for ${chart}"
              failed=1
              continue
            fi
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: optimized-baseline / scheduler (${chart})"
            else
              echo "FAIL: optimized-baseline / scheduler (${chart})"
              failed=1
            fi
          done
          exit $failed

      - name: Kustomize build and dry-run all model server overlays
        run: |
          failed=0
          for overlay_dir in guides/optimized-baseline/modelserver/*/; do
            # Each accelerator dir may have one or more server subdirs (vllm, sglang)
            for kust_dir in "${overlay_dir}"*/; do
              [ -f "${kust_dir}kustomization.yaml" ] || continue
              name="${kust_dir#guides/optimized-baseline/modelserver/}"
              name="${name%/}"
              echo ""
              echo "========================================"
              echo "optimized-baseline: ${name}"
              echo "========================================"
              echo "--- kustomize build ---"
              if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
                echo "FAIL: kustomize build failed for ${name}"
                failed=1
                continue
              fi
              echo "--- kubectl apply --dry-run=server ---"
              if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
                echo "PASS: optimized-baseline / ${name}"
              else
                echo "FAIL: optimized-baseline / ${name}"
                failed=1
              fi
            done
          done
          exit $failed

  dry-run-pd-disaggregation:
    needs: detect-changes
    if: needs.detect-changes.outputs.pd-disaggregation == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install client dependencies
        run: helpers/client-setup/install-deps.sh

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: helmfile-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh > /dev/null

      - name: Install gateway providers
        run: |
          cd guides/prereq/gateway-provider
          for f in *.helmfile.yaml; do
            # Skip kgateway - it is deprecated and its older CRDs would
            # overwrite the agentgateway installation.
            [[ "$f" == "kgateway.helmfile.yaml" ]] && continue
            echo "=== Installing gateway provider: $f ==="
            helmfile apply -f "$f" > /dev/null
          done

      - name: Wait for gateway control planes
        run: |
          for ns in istio-system agentgateway-system; do
            if kubectl get namespace "$ns" &>/dev/null; then
              echo "Waiting for pods in $ns..."
              kubectl wait --for=condition=ready pod \
                --selector=app.kubernetes.io/managed-by=Helm \
                --namespace "$ns" \
                --timeout=300s 2>/dev/null || true
            fi
          done

      - name: Install monitoring CRDs
        run: docs/monitoring/scripts/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run scheduler charts
        run: |
          CHART_VERSION=v1.5.0
          failed=0
          for chart in standalone inferencepool; do
            echo ""
            echo "========================================"
            echo "pd-disaggregation: scheduler (${chart})"
            echo "========================================"
            echo "--- helm template ---"
            if ! helm template pd-disaggregation-scheduler \
              "oci://registry.k8s.io/gateway-api-inference-extension/charts/${chart}" \
              -f guides/recipes/scheduler/base.values.yaml \
              -f guides/recipes/scheduler/features/monitoring.values.yaml \
              -f guides/pd-disaggregation/scheduler/pd-disaggregation.values.yaml \
              --version "${CHART_VERSION}" > /tmp/rendered.yaml; then
              echo "FAIL: helm template failed for ${chart}"
              failed=1
              continue
            fi
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: pd-disaggregation / scheduler (${chart})"
            else
              echo "FAIL: pd-disaggregation / scheduler (${chart})"
              failed=1
            fi
          done
          exit $failed

      - name: Kustomize build and dry-run all model server overlays
        run: |
          failed=0
          for overlay_dir in guides/pd-disaggregation/modelserver/*/; do
            # Each accelerator dir may have one or more server subdirs (vllm, sglang)
            for kust_dir in "${overlay_dir}"*/; do
              [ -f "${kust_dir}kustomization.yaml" ] || continue
              name="${kust_dir#guides/pd-disaggregation/modelserver/}"
              name="${name%/}"
              echo ""
              echo "========================================"
              echo "pd-disaggregation: ${name}"
              echo "========================================"
              echo "--- kustomize build ---"
              if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
                echo "FAIL: kustomize build failed for ${name}"
                failed=1
                continue
              fi
              echo "--- kubectl apply --dry-run=server ---"
              if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
                echo "PASS: pd-disaggregation / ${name}"
              else
                echo "FAIL: pd-disaggregation / ${name}"
                failed=1
              fi
            done
          done
          exit $failed

  dry-run-precise-prefix-cache-aware:
    needs: detect-changes
    if: needs.detect-changes.outputs.precise-prefix-cache-aware == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: kustomize-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh > /dev/null

      - name: Install monitoring CRDs
        run: docs/monitoring/scripts/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run scheduler (central + active-active)
        # ubuntu-latest ships helm v3, which accepts a path for --post-renderer.
        # (helm v4 users instead run `helm plugin install .../uds-tokenizer`
        # once and pass `--post-renderer uds-tokenizer`; see README.)
        run: |
          CHART_VERSION=v1.5.0
          POST_RENDERER=./guides/precise-prefix-cache-aware/scheduler/patches/uds-tokenizer/post-renderer.sh
          failed=0
          for feature in "" "active-active"; do
            label="${feature:-central}"
            echo ""
            echo "========================================"
            echo "precise-prefix-cache-aware: scheduler (${label})"
            echo "========================================"
            extra_values=()
            if [ -n "$feature" ]; then
              extra_values=(-f "guides/precise-prefix-cache-aware/scheduler/features/${feature}.values.yaml")
            fi
            echo "--- helm template ---"
            if ! helm template precise-prefix-cache-aware \
              "oci://registry.k8s.io/gateway-api-inference-extension/charts/standalone" \
              -f guides/recipes/scheduler/base.values.yaml \
              -f guides/precise-prefix-cache-aware/scheduler/precise-prefix-cache-aware.values.yaml \
              "${extra_values[@]}" \
              --post-renderer "${POST_RENDERER}" \
              --version "${CHART_VERSION}" > /tmp/rendered.yaml; then
              echo "FAIL: helm template failed for ${label}"
              failed=1
              continue
            fi
            echo "--- kubectl apply --dry-run=server ---"
            if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
              echo "PASS: precise-prefix-cache-aware / scheduler (${label})"
            else
              echo "FAIL: precise-prefix-cache-aware / scheduler (${label})"
              failed=1
            fi
          done
          exit $failed

      - name: Kustomize build and dry-run all model server overlays
        run: |
          failed=0
          for overlay_dir in guides/precise-prefix-cache-aware/modelserver/*/; do
            # Skip the components/ directory — its children are kustomize
            # Components (kind: Component), not standalone overlays.
            [[ "${overlay_dir}" == *"/components/"* ]] && continue
            for kust_dir in "${overlay_dir}"*/; do
              [ -f "${kust_dir}kustomization.yaml" ] || continue
              name="${kust_dir#guides/precise-prefix-cache-aware/modelserver/}"
              name="${name%/}"
              echo ""
              echo "========================================"
              echo "precise-prefix-cache-aware: ${name}"
              echo "========================================"
              echo "--- kustomize build ---"
              if ! kustomize build "${kust_dir}" > /tmp/rendered.yaml; then
                echo "FAIL: kustomize build failed for ${name}"
                failed=1
                continue
              fi
              echo "--- kubectl apply --dry-run=server ---"
              if kubectl apply --dry-run=server -f /tmp/rendered.yaml; then
                echo "PASS: precise-prefix-cache-aware / ${name}"
              else
                echo "FAIL: precise-prefix-cache-aware / ${name}"
                failed=1
              fi
            done
          done
          exit $failed

  dry-run-simulated-accelerators:
    needs: detect-changes
    if: needs.detect-changes.outputs.simulated-accelerators == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install client dependencies
        run: helpers/client-setup/install-deps.sh

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: helmfile-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh > /dev/null

      - name: Install gateway providers
        run: |
          cd guides/prereq/gateway-provider
          for f in *.helmfile.yaml; do
            # Skip kgateway - it is deprecated and its older CRDs would
            # overwrite the agentgateway installation.
            [[ "$f" == "kgateway.helmfile.yaml" ]] && continue
            echo "=== Installing gateway provider: $f ==="
            helmfile apply -f "$f" > /dev/null
          done

      - name: Wait for gateway control planes
        run: |
          for ns in istio-system agentgateway-system; do
            if kubectl get namespace "$ns" &>/dev/null; then
              echo "Waiting for pods in $ns..."
              kubectl wait --for=condition=ready pod \
                --selector=app.kubernetes.io/managed-by=Helm \
                --namespace "$ns" \
                --timeout=300s 2>/dev/null || true
            fi
          done

      - name: Install monitoring CRDs
        run: docs/monitoring/scripts/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Dry-run all environments
        run: |
          cd guides/simulated-accelerators
          # Extract only the YAML before the --- separator; the rest contains
          # Go template syntax that yq cannot parse.
          envs=$(awk '/^---/{exit} {print}' helmfile.yaml.gotmpl | yq -r '.environments | keys | .[]')
          for env_name in $envs; do
            echo ""
            echo "========================================"
            echo "simulated-accelerators: environment=$env_name"
            echo "========================================"
            echo "--- helmfile template ---"
            helmfile template -e "$env_name" > /tmp/rendered.yaml
            echo "--- creating namespaces ---"
            # Collect namespaces from helmfile release definitions and from the
            # rendered manifests (some resources reference namespaces outside the
            # release namespace, e.g. monitoring).
            {
              helmfile list -e "$env_name" 2>/dev/null | awk 'NR>1 {print $2}'
              grep -E '^\s+namespace:\s' /tmp/rendered.yaml | awk '{print $2}' | tr -d '"'"'"
            } | sort -u | while read -r ns; do
                kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f - 2>/dev/null || true
              done
            echo "--- kubectl apply --dry-run=server ---"
            kubectl apply --dry-run=server -f /tmp/rendered.yaml
            echo "PASS: simulated-accelerators / $env_name"
          done

  dry-run-workload-autoscaling:
    needs: detect-changes
    if: needs.detect-changes.outputs.workload-autoscaling == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install client dependencies
        run: helpers/client-setup/install-deps.sh

      - name: Create kind cluster
        uses: helm/kind-action@ef37e7f390d99f746eb8b610417061a60e82a6cc  # v1.14.0
        with:
          cluster_name: helmfile-dry-run
          node_image: kindest/node:v1.35.0  # 1.35+ required for stable DRA (resource.k8s.io/v1)
          version: v0.31.0
          wait: 120s

      - name: Install Gateway API and GAIE CRDs
        run: guides/prereq/gateway-provider/install-gateway-provider-dependencies.sh > /dev/null

      - name: Install gateway providers
        run: |
          cd guides/prereq/gateway-provider
          for f in *.helmfile.yaml; do
            # Skip kgateway - it is deprecated and its older CRDs would
            # overwrite the agentgateway installation.
            [[ "$f" == "kgateway.helmfile.yaml" ]] && continue
            echo "=== Installing gateway provider: $f ==="
            helmfile apply -f "$f" > /dev/null
          done

      - name: Wait for gateway control planes
        run: |
          for ns in istio-system agentgateway-system; do
            if kubectl get namespace "$ns" &>/dev/null; then
              echo "Waiting for pods in $ns..."
              kubectl wait --for=condition=ready pod \
                --selector=app.kubernetes.io/managed-by=Helm \
                --namespace "$ns" \
                --timeout=300s 2>/dev/null || true
            fi
          done

      - name: Install monitoring CRDs
        run: docs/monitoring/scripts/install-prometheus-grafana.sh --crds-only

      - name: Install GKE CRDs
        run: .github/scripts/install-gke-crds.sh

      - name: Install WVA CRDs
        run: |
          helm show crds oci://ghcr.io/llm-d/workload-variant-autoscaler --version 0.5.1 \
            | kubectl apply --server-side --validate=false -f -

      # Create a dummy TLS cert so workload-autoscaling's readFile for
      # prometheus-ca.crt succeeds during helmfile template.
      - name: Create dummy prometheus CA cert
        run: |
          openssl req -x509 -newkey ec -pkeyopt ec_paramgen_curve:prime256v1 \
            -keyout /dev/null -out /tmp/prometheus-ca.crt -days 1 -nodes \
            -subj "/CN=dummy-ca" 2>/dev/null

      - name: Dry-run all environments
        env:
          TMPDIR: /tmp
        run: |
          cd guides/workload-autoscaling
          # Extract only the YAML before the --- separator; the rest contains
          # Go template syntax that yq cannot parse.
          envs=$(awk '/^---/{exit} {print}' helmfile.yaml.gotmpl | yq -r '.environments | keys | .[]')
          for env_name in $envs; do
            echo ""
            echo "========================================"
            echo "workload-autoscaling: environment=$env_name"
            echo "========================================"
            echo "--- helmfile template ---"
            helmfile template -e "$env_name" > /tmp/rendered.yaml
            echo "--- creating namespaces ---"
            # Collect namespaces from helmfile release definitions and from the
            # rendered manifests (some resources reference namespaces outside the
            # release namespace, e.g. monitoring).
            {
              helmfile list -e "$env_name" 2>/dev/null | awk 'NR>1 {print $2}'
              grep -E '^\s+namespace:\s' /tmp/rendered.yaml | awk '{print $2}' | tr -d '"'"'"
            } | sort -u | while read -r ns; do
                kubectl create namespace "$ns" --dry-run=client -o yaml | kubectl apply -f - 2>/dev/null || true
              done
            echo "--- kubectl apply --dry-run=server ---"
            kubectl apply --dry-run=server -f /tmp/rendered.yaml
            echo "PASS: workload-autoscaling / $env_name"
          done
